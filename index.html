<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifu Service | 岐阜服务站</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <style>
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; margin: 0; text-align: center; background: #f4f7f6; color: #333; }
        .container { max-width: 800px; margin: auto; padding: 50px 20px; }
        h1 { margin-bottom: 20px; }
        
        /* 语言切换按钮样式 */
        .lang-switch { margin-bottom: 30px; }
        button { padding: 10px 25px; cursor: pointer; border: 1px solid #ddd; background: white; border-radius: 20px; transition: 0.3s; font-weight: bold; }
        button:hover { background: #007AFF; color: white; border-color: #007AFF; }
        button.active { background: #007AFF; color: white; border-color: #007AFF; }

        /* 卡片网格布局 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit; display: block; border: 1px solid transparent; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 1px solid #007AFF; }
        .card span { font-size: 50px; display: block; margin-bottom: 15px; }
        
        /* 初始隐藏逻辑优化 */
        .lang-content { display: none; }
        .visible { display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch">
        <button id="btn-zh" onclick="showLang('zh')" class="active">中文</button>
        <button id="btn-jp" onclick="showLang('jp')">日本語</button>
    </div>

    <header>
        <h1 class="lang-content zh visible">你好！我在岐阜为您提供服务</h1>
        <h1 class="lang-content jp">こんにちは！岐阜でサポートいたします</h1>
    </header>

    <div class="grid">
        <a class="card" href="#">
            <span>🧼</span>
            <div class="lang-content zh visible">
                <h3>空调清洁</h3>
                <p>专业深度清洗，岐阜全域对应</p>
            </div>
            <div class="lang-content jp">
                <h3>エアコンクリーニング</h3>
                <p>プロの洗浄、岐阜県内対応</p>
            </div>
        </a>

        <a class="card" href="#">
            <span>💻</span>
            <div class="lang-content zh visible">
                <h3>电脑故障咨询</h3>
                <p>远程诊断及上门维修</p>
            </div>
            <div class="lang-content jp">
                <h3>パソコン修理・相談</h3>
                <p>遠隔診断・訪問修理</p>
            </div>
        </a>

        <a class="card" href="#">
            <span>📥</span>
            <div class="lang-content zh visible">
                <h3>常用软件下载</h3>
                <p>精选工具，安全快捷</p>
            </div>
            <div class="lang-content jp">
                <h3>ソフトダウンロード</h3>
                <p>厳選ツール、安全・高速</p>
            </div>
        </a>
    </div>
</div>

<script>
    function showLang(lang) {
        // 1. 切换所有内容的显示
        document.querySelectorAll('.lang-content').forEach(el => {
            el.classList.remove('visible');
        });
        document.querySelectorAll('.' + lang).forEach(el => {
            el.classList.add('visible');
        });

        // 2. 切换按钮的激活状态样式
        document.querySelectorAll('.lang-switch button').forEach(btn => {
            btn.classList.remove('active');
        });
        document.getElementById('btn-' + lang).classList.add('active');

        // 3. (可选) 向追踪系统发送切换语言事件
        if (typeof gtag === 'function') {
            gtag('event', 'change_language', { 'language': lang });
        }
      }
</script>

</body>
</html>
