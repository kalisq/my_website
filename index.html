<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifu Service | 岐阜服务站</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .lang-switch { margin-bottom: 20px; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .active { background: #007bff; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 900px; width: 90%; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-decoration: none; color: inherit; transition: transform 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card span { font-size: 50px; display: block; margin-bottom: 15px; }
        .lang-content { display: none; }
        .visible { display: block; }
    </style>
</head>
<body>
    <div class="lang-switch">
        <button id="btn-zh" class="active" onclick="switchLang('zh')">中文</button>
        <button id="btn-jp" onclick="switchLang('jp')">日本語</button>
    </div>

    <h1 class="zh visible">你好！我在岐阜为您提供服务</h1>
    <h1 class="jp">こんにちは！岐阜でサービスを提供しています</h1>

    <div class="grid">
        <div class="card"><span>🧼</span><div class="zh visible"><h3>空调清洁</h3><p>专业深度清洗</p></div><div class="jp"><h3>エアコン洗浄</h3><p>プロの徹底洗浄</p></div></div>
        
        <a class="card" href="mailto:sq25819487@gmail.com">
            <span>💻</span>
            <div class="zh visible"><h3>电脑故障咨询</h3><p>远程诊断及上门维修</p></div>
            <div class="jp"><h3>パソコン相談</h3><p>遠隔診断・訪問修理</p></div>
        </a>

        <a class="card" href="software.html">
            <span>📥</span>
            <div class="zh visible"><h3>软件工具库</h3><p>分类导航，官网直达</p></div>
            <div class="jp"><h3>ソフトライブラリ</h3><p>カテゴリ別、公式サイト直結</p></div>
        </a>
    </div>

    <script>
        function switchLang(lang) {
            document.querySelectorAll('.zh, .jp').forEach(el => el.classList.remove('visible'));
            document.querySelectorAll('.' + lang).forEach(el => el.classList.add('visible'));
            document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
            document.getElementById('btn-jp').classList.toggle('active', lang === 'jp');
        }
    </script>
</body>
</html>
